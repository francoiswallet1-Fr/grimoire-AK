<style>

  :root{
    --bg:#F7F5F2;--surface:#FFF;--surface2:#F2F0ED;
    --border:#E0DDD8;--border-strong:#C8C4BE;
    --text:#1A1816;--text-2:#5A5650;--text-3:#8A8680;
    --accent:#2C5F8A;--accent-bg:#EBF3FB;
    --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

  /* ── Header ── */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px 8px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
  .header-title{font-size:15px;font-weight:600}
  .header-sub{font-size:11px;color:var(--text-3)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-3);pointer-events:none}
  input[type=text]{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border-strong);border-radius:7px;background:var(--surface2);color:var(--text);font-size:13px;outline:none}
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 2px #2C5F8A22}
  .stat-pill strong{color:var(--text);font-weight:600}

  /* ── Nav 2 lignes ── */
  .cat-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0;position:sticky;top:var(--header-h,56px);z-index:90}
  .cat-row{display:flex;padding:0 12px;overflow-x:auto;scrollbar-width:none;gap:0;flex-wrap:nowrap}
  .cat-row::-webkit-scrollbar{display:none}
  .cat-row-1{border-bottom:1px solid var(--border)}
  .cat-btn{
    padding:6px 10px;font-size:12px;font-weight:500;
    border:none;background:none;cursor:pointer;
    color:var(--text-2);border-bottom:2px solid transparent;
    white-space:nowrap;transition:color .15s,border-color .15s,background .15s;
    display:flex;align-items:center;gap:5px;
  }
  .cat-btn:hover{color:var(--text);background:var(--surface2)}
  .cat-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .cat-btn-all{font-weight:600;padding:8px 16px}
  .cat-count{font-size:10px;padding:1px 5px;border-radius:9px;background:var(--surface2);color:var(--text-3);font-weight:400}
  .cat-btn.active .cat-count{background:var(--accent-bg);color:var(--accent)}

  /* ── Main ── */
  .main{padding:16px 24px;max-width:1280px;margin:0 auto}
  .cat-section{margin-bottom:32px}
  .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)}
  .cat-icon{font-size:18px}
  .cat-label{font-size:16px;font-weight:600}
  .cat-badge{font-size:11px;padding:2px 9px;border-radius:12px;font-weight:500;margin-left:auto}

  /* ── Cards ── */
  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column}
  .card:hover{border-color:var(--border-strong);box-shadow:0 2px 10px rgba(0,0,0,.1)}
  .card-head{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px}
  .swatches{display:flex;gap:3px;flex-shrink:0}
  .sw{width:16px;height:36px;border-radius:4px;border:1px solid rgba(0,0,0,.1)}
  .card-meta{flex:1;min-width:0}
  .card-title{font-size:14px;font-weight:600;line-height:1.3}
  .card-sub{font-size:11px;color:var(--text-3);margin-top:2px}
  .card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
  .card-body{border-top:1px solid var(--border);padding:10px 14px;flex:1}
  .step{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border)}
  .step:last-of-type{border-bottom:none}
  .step-num{font-size:10px;font-weight:600;color:var(--text-3);background:var(--surface2);border-radius:4px;padding:1px 5px;min-width:20px;text-align:center;margin-top:2px;flex-shrink:0}
  .step-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0;margin-top:3px;border:1px solid rgba(0,0,0,.12)}
  .step-info{flex:1;min-width:0}
  .step-label{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
  .step-ref{font-size:10px;color:var(--text-3);font-family:monospace}
  .step-txt{font-size:12px;color:var(--text-2);margin-top:1px;line-height:1.4}
  .tip{margin-top:8px;padding:6px 9px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--border-strong);font-size:11px;color:var(--text-2);font-style:italic}
  .tip::before{content:'💡 ';font-style:normal}
  .badge{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:500}
  .empty{padding:40px;text-align:center;color:var(--text-3);grid-column:1/-1}

  @media print{.header{position:static}.cat-nav{display:none}.card{break-inside:avoid;box-shadow:none}}
  @media(max-width:600px){
    .header{padding:14px 16px 12px}.main{padding:14px 16px}
    .cat-btn{padding:6px 10px;font-size:11px}
    .cat-row{padding:0 12px}
  }


  /* Favoris */
  .fav-btn{background:none;border:none;cursor:pointer;font-size:20px;line-height:1;
    padding:4px;color:#C8C4BE;transition:color .2s,transform .15s;flex-shrink:0;margin-left:auto}
  .fav-btn:hover{color:#E8B800;transform:scale(1.15)}
  .fav-btn.active{color:#E8B800}
  .fav-btn:active{transform:scale(.9)}
  .card.favorited{border-color:#E8B800}
  .card.favorited .card-head{background:#FFFBEE}
  .cat-btn-fav{color:#7F6000!important}
  .cat-btn-fav.active{color:#7F6000!important;border-bottom-color:#E8B800!important}
  .fav-badge{position:absolute;top:4px;right:4px;background:#E8B800;color:#fff;
    font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
    padding:0 4px;display:none;align-items:center;justify-content:center}
  .fav-badge.visible{display:flex}
  .fig-banner{background:#FFF9E6;border-bottom:1px solid #E8D800;padding:5px 16px;
    display:none;align-items:center;gap:8px;flex-wrap:wrap}
  .fig-banner.visible{display:flex}
  .fig-banner-title{font-size:11px;font-weight:600;color:#7F6000;flex:1}
  .fig-banner-count{font-size:10px;background:#FFF2CC;color:#7F6000;
    padding:2px 8px;border-radius:20px;border:1px solid #E8D800}
  .fig-banner-clear{font-size:10px;padding:3px 9px;background:#fff;
    border:1px solid #C8B000;border-radius:6px;color:#7F6000;cursor:pointer;font-family:inherit}
  .fig-banner-clear:hover{background:#FFF2CC}
  .fav-empty{grid-column:1/-1;padding:48px 24px;text-align:center;color:var(--text-3)}
  .fav-empty-icon{font-size:48px;margin-bottom:12px}
  .fav-empty-text{font-size:14px;line-height:1.6}




</style>
</head>

nd est le plus sale (Pure Grime), la face avant la plus exposée au soleil (la plus claire)."},{"name":"Étui à parchemins en cuir verni","cat":"Accessoires","sub":"Pochette","niveau":"Intermédiaire","swatches":["11106","11110","11206"],"steps":[["Base","11106","Mahogany Brown en base dense — cuir de qualité supérieure verni"],["Lavis","19302","Obsidian Holt dans les coutures et la jonction du couvercle"],["Rehaut","11110","Leather Brown sur les surfaces planes — le verni laisse voir le cuir"],["Vernis","11206","Pearl en glacis dilué sur toute la surface — l'aspect lustré du cuir verni"],["Métal","11191","Gold sur les fermoirs, charnières et le monogramme gravé"]],"tip":"L'aspect verni s'obtient par un glacis Pearl très dilué (1:4) appliqué en couches successives sur une surface bien sèche — 2 à 3 couches donnent un lustre progressif sans devenir plastique."},{"name":"Besace de mage","cat":"Accessoires","sub":"Pochette","niveau":"Intermédiaire","swatches":["11102","11177","11069"],"steps":[["Base","11102","Deep Brown en base — cuir de qualité d'un praticien de la magie"],["Lavis","19302","Obsidian Holt dans les coutures et les plis du cuir"],["Cuir","11110","Leather Brown en rehaut sur les surfaces planes"],["Runes","11177","Ducat Blue au liner sur les runes de protection gravées"],["Lueur","11069","Pastel Violet en halo très dilué autour des runes — magie latente"]],"tip":"Les runes de protection d'une besace de mage sont gravées, pas peintes — travailler le cuir complètement avant d'ajouter les runes. Le halo Pastel Violet autour des runes s'applique au glacis très dilué pour ne pas dominer la composition."},{"name":"Grenade en fonte","cat":"Accessoires","sub":"Grenade","niveau":"Débutant","swatches":["11212","11103","11031"],"steps":[["Base","11212","Gun Metal en base couvrant — fonte brute de la grenade"],["Lavis","19302","Obsidian Holt dans les cannelures et les soudures"],["Drybrush","11210","Natural Steel en drybrush sur les reliefs des cannelures"],["Rouille","11103","Medium Rust en touches irrégulières — zones de corrosion"],["Mèche","11031","Buff sur la mèche tressée, Sepia Filth pour la salir"]],"tip":"Les cannelures d'une grenade sont régulières et géométriques — le drybrush doit suivre les arêtes des cannelures avec précision. Une touche de Medium Rust au niveau du filetage de la mèche est particulièrement réaliste."},{"name":"Grenade alchimique","cat":"Accessoires","sub":"Grenade","niveau":"Intermédiaire","swatches":["11212","11144","11174"],"steps":[["Corps","11212","Gun Metal en base sur le corps métallique de la grenade"],["Lavis corps","19303","Black Night dans les soudures et les rainures"],["Métal","11207","Aluminium en drybrush sur les parties bombées — métal travaillé"],["Liquide","11144","Emerald en base dans le flacon de verre — liquide alchimique"],["OSL","11143","Mint Green en halo dilué autour du flacon — lueur de la substance"]],"tip":"Le flacon de verre d'une grenade alchimique émet une lueur — peindre d'abord le liquide (Emerald), puis un halo de Mint Green très dilué sur le métal autour du flacon crée un OSL qui prouve que la substance brille réellement."},{"name":"Flacon de potion verte","cat":"Accessoires","sub":"Flacon","niveau":"Intermédiaire","swatches":["11029","11144","11143"],"steps":[["Base verre","11029","Black en base très fine — le verre sombre laisse passer la couleur"],["Liquide","11144","Emerald en couche couvrant les 3/4 du flacon — la potion verte"],["Translucidité","11143","Mint Green sur le tiers supérieur — lumière traversant le liquide"],["OSL","11141","Light Green en halo très dilué autour du flacon — lueur émise"],["Bouchon","11031","Buff pour le bouchon en liège, Sepia Filth pour le vieillir"]],"tip":"La potion est plus sombre en bas (liquide dense) et plus claire en haut (lumière traversante) — inverser ce dégradé donne un flacon non-crédible. Le bouchon en liège reçoit un lavis de Woodgrain pour le grain du bois."},{"name":"Flacon de potion rouge","cat":"Accessoires","sub":"Flacon","niveau":"Intermédiaire","swatches":["11029","11089","11087"],"steps":[["Base verre","11029","Black en base fine sur tout le flacon"],["Liquide","11089","Blood Red couvrant les 3/4 du flacon — la potion rouge"],["Translucidité","11087","Scarlet Red sur le tiers supérieur — lumière à travers le liquide"],["OSL","11077","Light Orange en halo très dilué — teinte chaleureuse émise par la potion"],["Bouchon","11031","Buff sur le bouchon de liège, Sepia Filth pour le vieillir"]],"tip":"Une potion de soin rouge brille comme du sang éclairé — l'OSL Light Orange autour du flacon est contre-intuitif (orange sur un liquide rouge) mais c'est exactement le reflet chaud que produit la lumière traversant un liquide rouge."},{"name":"Fiole empoisonnée violet","cat":"Accessoires","sub":"Flacon","niveau":"Avancé","swatches":["11029","11072","11069"],"steps":[["Base verre","11029","Black en base fine — verre sombre d'une fiole de poison"],["Poison","11072","Deep Violet couvrant les 3/4 de la fiole — la substance empoisonnée"],["Translucidité","11069","Pastel Violet sur le tiers supérieur — lumière traversant le poison"],["OSL","11060","Sickly Pink en halo très dilué — reflet malsain autour de la fiole"],["Métal","11212","Gun Metal sur le bouchon métallique vissé, Natural Steel sur les arêtes"]],"tip":"Le poison violet émet un reflet légèrement rosé (Sickly Pink) et non violet — la teinte OSL d'une substance est toujours légèrement différente de sa couleur propre. Cette dissonance subtile renforce paradoxalement le réalisme de l'effet."},{"name":"Parchemin neuf","cat":"Accessoires","sub":"Matière","niveau":"","steps":[["Base","11004","Deck Tan en base légèrement diluée — parchemin de bonne qualité, propre"],["Lavis","19305","Sepia Filth en lavis très léger sur les bords — légère teinte naturelle"],["Rehaut","11001","Buff en drybrush très léger sur les surfaces planes"],["Encre","11029","Ivory en micro-touches sur les zones les plus claires"],["Finition","11004","Deep Brown au function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); }
  catch(e) { return new Set(); }
}
function saveFavs(favs) {
  localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
}
function toggleFav(id, btn) {
  const favs = getFavs();
  if (favs.has(id)) {
    favs.delete(id);
    btn.classList.remove('active');
    btn.textContent = '☆';
    btn.closest('.card')?.classList.remove('favorited');
  } else {
    favs.add(id);
    btn.classList.add('active');
    btn.textContent = '★';
    btn.closest('.card')?.classList.add('favorited');
  }
  saveFavs(favs);
  updateFavUI();
}
function clearFavs() {
  if (!confirm('Vider "Ma Figurine" et recommencer ?')) return;
  saveFavs(new Set());
  document.querySelectorAll('.fav-btn').forEach(b => {
    b.classList.remove('active');
    b.textContent = '☆';
    b.closest('.card')?.classList.remove('favorited');
  });
  updateFavUI();
  if (activecat === '__favs__') render();
}
function updateFavUI() {
  const n = getFavs().size;
  const banner = document.getElementById('fig-banner');
  const countEl = document.getElementById('fig-count');
  if (banner)  banner.classList.toggle('visible', n > 0);
  if (countEl) countEl.textContent = n + ' recette' + (n > 1 ? 's' : '');
  const badge = document.getElementById('fav-nav-badge');
  if (badge) { badge.textContent = n; badge.classList.toggle('visible', n > 0); }
}

// ── makeCard ─────────────────────────────────────────────────────
function makeCard(r) {
  const favs = getFavs();
  const isFav = favs.has(r.id || r.name);
  const m = CAT_META[r.cat] || {icon:'',color:'#666',bg:'#F5F5F5',textColor:'#333'};

  const sw = r.swatches.map(ref => {
    const p = PAINTS[ref]; const h = p ? p[1] : 'CCCCCC';
    return `<div class="sw" style="background:#${h}" title="${p ? p[0] : 'AK '+ref}"></div>`;
  }).join('');

  const niv  = NIV[r.niveau];
  const nivB = niv ? `<span class="badge" style="background:${niv.bg};color:${niv.color}">${r.niveau}</span>` : '';
  const subB = `<span class="badge" style="background:${m.bg};color:${m.textColor}">${r.sub}</span>`;

  const steps = r.steps.map((s, i) => {
    const [label, ref, txt] = s;
    const p = PAINTS[ref]; const h = p ? p[1] : 'CCCCCC';
    return `<div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-dot" style="background:#${h}"></div>
      <div class="step-info">
        <div class="step-label">${label}</div>
        <div class="step-ref">AK ${ref} — ${p ? p[0] : ref}</div>
        <div class="step-txt">${txt}</div>
      </div>
    </div>`;
  }).join('');

  const tip = r.tip ? `<div class="tip">${r.tip}</div>` : '';
  const favId = (r.id || r.name).replace(/'/g, '');

  const card = document.createElement('div');
  card.className = 'card' + (isFav ? ' favorited' : '');
  card.innerHTML = `
    <div class="card-head">
      <div class="swatches">${sw}</div>
      <div class="card-meta">
        <div class="card-title">${r.name}</div>
        <div class="card-sub">${r.cat}</div>
        <div class="card-badges">${subB}${nivB}</div>
      </div>
      <button class="fav-btn ${isFav ? 'active' : ''}"
        onclick="toggleFav('${favId}', this)"
        title="${isFav ? 'Retirer de ma figurine' : 'Ajouter à ma figurine'}"
      >${isFav ? '★' : '☆'}</button>
    </div>
    <div class="card-body">${steps}${tip}</div>`;
  return card;
}

  "Péaux":           {icon:"🫀",  color:"#7B0000", bg:"#FDECEA", textColor:"#7B0000"},

  "Pierre":          {icon:"🪨",  color:"#4A4E5A", bg:"#ECEEF2", textColor:"#4A4E5A"},
  "Weathering":      {icon:"🌧️", color:"#4A3020", bg:"#EEE9E4", textColor:"#4A3020"},
  "Accessoires":     {icon:"📜",  color:"#2C3E5A", bg:"#ECEEF5", textColor:"#2C3E5A"},

  "Cristaux":        {icon:"🔮",  color:"#305070", bg:"#ECF2F8", textColor:"#305070"},
  "Os & Cornes":     {icon:"🦴",  color:"#6A5A30", bg:"#F5F2E8", textColor:"#6A5A30"},

  "Capes":{icon:"🧥",  color:"#3A2060", bg:"#EDE5F7", textColor:"#3A2060"},
  "Épées":           {icon:"⚔️",  color:"#7B0000", bg:"#FDECEA", textColor:"#7B0000"},
  "Peaux":           {icon:"🫀",  color:"#7B2020", bg:"#FDECEA", textColor:"#7B0000"},
};
const ROW1 = ["Métaux","Capes","Tenue","Cuirs - Cordes","Peaux"];
const ROW2 = ["Épées","Bois","Cheveux","Fourrures","Accessoires"];
const ROW3 = ["Pierre","Gemmes & Cristaux","Os & Cornes","Weathering"];

// ── buildNav ──────────────────────────────────────────────────────
function buildNav() {
  const allCats = [...new Set(ALL.map(r => r.cat))];
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';

  const mkBtn = (label, cat, n, extraClass='') => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + extraClass + (activecat === cat ? ' active' : '');
    const m = CAT_META[cat] || {};
    const icon = cat && cat !== '__favs__' ? (m.icon || '') : '';
    b.innerHTML = `${icon} ${label} <span class="cat-count">${n}</span>`;
    b.onclick = () => { activecat = cat; buildNav(); render(); };
    return b;
  };

  const row1 = document.createElement('div');
  row1.className = 'cat-row cat-row-1';
  row1.appendChild(mkBtn('Toutes', '', ALL.length));
  ROW1.filter(c => allCats.includes(c)).forEach(cat => {
    row1.appendChild(mkBtn(cat, cat, ALL.filter(r => r.cat === cat).length));
  });
  nav.appendChild(row1);

  const row2 = document.createElement('div');
  row2.className = 'cat-row cat-row-2';
  ROW2.filter(c => allCats.includes(c)).forEach(cat => {
    row2.appendChild(mkBtn(cat, cat, ALL.filter(r => r.cat === cat).length));
  });
  nav.appendChild(row2);

  const row3 = document.createElement('div');
  row3.className = 'cat-row cat-row-3';
  ROW3.filter(c => allCats.includes(c)).forEach(cat => {
    row3.appendChild(mkBtn(cat, cat, ALL.filter(r => r.cat === cat).length));
  });
  // Remaining cats not in any row
  [...new Set(ALL.map(r=>r.cat))].filter(c => !ROW1.includes(c) && !ROW2.includes(c) && !ROW3.includes(c)).forEach(cat => {
    row3.appendChild(mkBtn(cat, cat, ALL.filter(r => r.cat === cat).length));
  });
  // ⭐ Ma Figurine at end of ROW3
  const favN0 = getFavs().size;
  const favBtn0 = document.createElement('button');
  favBtn0.className = 'cat-btn cat-btn-fav' + (activecat === '__favs__' ? ' active' : '');
  favBtn0.innerHTML = `⭐ Ma Figurine <span class="cat-count" style="background:${activecat==='__favs__'?'#FFF2CC':'var(--surface2)'};color:${activecat==='__favs__'?'#7F6000':'var(--text-3)'}"> ${favN0}</span>`;
  favBtn0.onclick = () => { activecat = '__favs__'; buildNav(); render(); };
  row3.appendChild(favBtn0);
  nav.appendChild(row3);

}

// ── render ────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Vue Ma Figurine
  if (activecat === '__favs__') {
    const favRecs = ALL.filter(r => getFavs().has(r.id || r.name));

    if (!favRecs.length) {
      main.innerHTML = `<div class="fav-empty">
        <div class="fav-empty-icon">⭐</div>
        <div class="fav-empty-text">Aucune recette dans "Ma Figurine".<br>Clique sur l'étoile ☆ d'une recette pour l'ajouter.</div>
      </div>`;
      return;
    }
    const cats = [...new Set(favRecs.map(r => r.cat))];
    cats.forEach(cat => {
      const recs = favRecs.filter(r => r.cat === cat);
      const m = CAT_META[cat] || {icon:'',color:'#666',bg:'#F5F5F5',textColor:'#333'};
      const sec = document.createElement('section');
      sec.className = 'cat-section';
      sec.innerHTML = `<div class="cat-header"><span class="cat-icon">${m.icon}</span><span class="cat-label" style="color:${m.color}">${cat}</span><span class="cat-badge" style="background:${m.bg};color:${m.textColor}">${recs.length} recette${recs.length>1?'s':''}</span></div>`;
      const grid = document.createElement('div');
      grid.className = 'recipe-grid';
      recs.forEach(r => grid.appendChild(makeCard(r)));
      sec.appendChild(grid);
      main.appendChild(sec);
    });
    return;
  }

  // Vue normale
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = ALL.filter(r => {
    if (activecat && r.cat !== activecat) return false;
    if (!q) return true;
    return [r.name, r.cat, r.sub, r.niveau,
      ...r.steps.map(s => s[0]+' '+s[2]),
      ...r.steps.map(s => PAINTS[s[1]] ? PAINTS[s[1]][0] : '')
    ].join(' ').toLowerCase().includes(q);
  });

  if (!filtered.length) {
    main.innerHTML = '<div class="empty">Aucune recette trouvée.</div>';
    return;
  }

  const ordered = [...ROW1, ...ROW2, ...ROW3, ...[...new Set(filtered.map(r=>r.cat))].filter(c=>!ROW1.includes(c)&&!ROW2.includes(c)&&!ROW3.includes(c))];
  ordered.filter(c => filtered.some(r => r.cat === c)).forEach(cat => {
    const recs = filtered.filter(r => r.cat === cat);
    if (!recs.length) return;
    const m = CAT_META[cat] || {icon:'',color:'#666',bg:'#F5F5F5',textColor:'#333'};
    const sec = document.createElement('section');
    sec.className = 'cat-section';
    sec.innerHTML = `<div class="cat-header">
      <span class="cat-icon">${m.icon}</span>
      <span class="cat-label" style="color:${m.color}">${cat}</span>
      <span class="cat-badge" style="background:${m.bg};color:${m.textColor}">${recs.length} recette${recs.length>1?'s':''}</span>
    </div>`;
    const grid = document.createElement('div');
    grid.className = 'recipe-grid';
    recs.forEach(r => grid.appendChild(makeCard(r)));
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

buildNav();
render();
updateFavUI();

  const h = document.querySelector('.header');
  if (h) document.documentElement.style.setProperty('--header-h', h.offsetHeight + 'px');
}
updateHeaderHeight();
window.addEventListener('resize', updateHeaderHeight);
